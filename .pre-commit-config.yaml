# .pre-commit-config.yaml
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    hooks:
      # Run the linter.
      - id: ruff
        args: [ --fix ]      
      # Run the formatter.
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    hooks:
      - id: mypy
        args:
          - '--show-error-codes'
          - '--explicit-package-bases'
          - '--install-types'
          - '--non-interactive'
          - '--ignore-missing-imports'
