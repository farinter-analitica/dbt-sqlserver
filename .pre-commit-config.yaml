# .pre-commit-config.yaml
default_stages: [pre-commit]
default_language_version:
  python: python3.12
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff
        name: Ruff Lint
        entry: ruff
        args: [check, --fix, --exit-non-zero-on-fix]
        #language: system
        #pass_filenames: false
        types: [python]
      - id: ruff-format
        name: Ruff Format
        entry: ruff
        args: [format]
        # System lang would means pre-commit will not try to install a new environment for this hook. It relies on
        # having a pre-existing `make` installed (and scripts/run-pyright.py).
        #language: system
        #pass_filenames: false
        types: [python]
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.402
    hooks:
      - id: pyright
        name: pyright
        entry: pyright
        args: [--level=warning, --warnings]
        #language: system
        types: [python]

  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.7.13
    hooks:
      - id: uv-lock

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0 # Use the ref you want to point at
    hooks:
      - id: check-added-large-files

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        name: YAML Lint
        entry: yamllint
        args: [--no-warnings]
        types: [yaml]
