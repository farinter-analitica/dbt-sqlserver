name: Deploy Dagster

on:
  push:
    branches: [main, dev]

env:
  DAGSTER_INSTANCE_CURRENT_ENV: ${{ github.ref == 'refs/heads/main' && 'prd' || 'dev' }}
  DEPLOY_DIR: ${{ github.ref == 'refs/heads/main' && '/opt/main_dagster_prd' || '/opt/main_dagster_dev' }}
  ENV: ${{ github.ref == 'refs/heads/main' && 'prd' || 'dev' }}
  ENV_NAME: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

jobs:
  detect-changes:
    runs-on: self-hosted
    outputs:
      service_templates_changed: ${{ steps.filter.outputs.service_templates }}
      python_version_changed: ${{ steps.filter.outputs.python_version }}
      dependencies_changed: ${{ steps.filter.outputs.dependencies }}
      code_changed: ${{ steps.filter.outputs.code }}
      deployment_type: ${{ steps.set-deployment.outputs.deployment_type }}
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Filter changed files
        id: filter
        run: |
          # Get changed files
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
          
          # Check for service template changes
          if echo "$CHANGED_FILES" | grep -q "scripts/generate_dagster_service.py\|.service$"; then
            echo "service_templates=true" >> $GITHUB_OUTPUT
          else
            echo "service_templates=false" >> $GITHUB_OUTPUT
          fi
          
          # Check for Python version changes
          if echo "$CHANGED_FILES" | grep -q "pyproject.toml"; then
            # Check if the Python version specifically changed
            if git diff HEAD^ HEAD -- pyproject.toml | grep -q "python_version"; then
              echo "python_version=true" >> $GITHUB_OUTPUT
            else
              echo "python_version=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "python_version=false" >> $GITHUB_OUTPUT
          fi

          # Check for dependency changes
          if echo "$CHANGED_FILES" | grep -q "pyproject.toml"; then
            echo "dependencies=true" >> $GITHUB_OUTPUT
          else
            echo "dependencies=false" >> $GITHUB_OUTPUT
          fi

          # Code changes - assuming if there is any diff, this is always true
          echo "code=true" >> $GITHUB_OUTPUT
      
      - name: Set deployment type
        id: set-deployment
        run: |
          if [[ "${{ steps.filter.outputs.service_templates }}" == "true" ]]; then
            echo "deployment_type=deploy-full" >> $GITHUB_OUTPUT
          elif [[ "${{ steps.filter.outputs.python_version }}" == "true" ]]; then
            echo "deployment_type=deploy-partial" >> $GITHUB_OUTPUT
          elif [[ "${{ steps.filter.outputs.dependencies }}" == "true" ]]; then
            echo "deployment_type=deploy-fast" >> $GITHUB_OUTPUT
          else
            echo "deployment_type=deploy-continuous" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: detect-changes
    runs-on: self-hosted
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure Git Repository
        run: |
          cd ${{ env.DEPLOY_DIR }}
          git config --global --add safe.directory ${{ env.DEPLOY_DIR }}
          export GIT_DIR="${{ env.DEPLOY_DIR }}/.git"
          export GIT_WORK_TREE="${{ env.DEPLOY_DIR }}"

      - name: Update Code from Repository  
        run: |
          cd ${{ env.DEPLOY_DIR }}
          git fetch origin
          git checkout ${GITHUB_REF#refs/heads/}
          git pull --rebase origin ${GITHUB_REF#refs/heads/}

      - name: Process DBT Files
        run: |
          source ${{ env.DEPLOY_DIR }}/.venv_main_dagster/bin/activate
          python "${{ env.DEPLOY_DIR }}/dbt_dwh_farinter/autoload_dbt_deploy.py"

      - name: Run Deployment
        env:
          ENV: ${{ env.ENV }}
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
        run: |
          cd ${{ env.DEPLOY_DIR }}
          source ${{ env.DEPLOY_DIR }}/.venv_main_dagster/bin/activate
          python "${{ env.DEPLOY_DIR }}/scripts/deployment.py" ${{ needs.detect-changes.outputs.deployment_type }}
          echo "Executed deployment strategy: ${{ needs.detect-changes.outputs.deployment_type }}"

      - name: Verify Deployment Status
        if: always()
        run: |
          sudo systemctl status dagster_${{ env.ENV }}_webserver | grep -q "active (running)" && \
          sudo systemctl status dagster_${{ env.ENV }}_daemon | grep -q "active (running)"
          
          if [[ $? -eq 0 && ${{ job.status }} == 'success' ]]; then
            echo "✅ Deployment to ${{ env.ENV_NAME }} successful"
            echo "Deployment strategy used: ${{ needs.detect-changes.outputs.deployment_type }}"
          else
            echo "❌ Deployment to ${{ env.ENV_NAME }} failed"
            exit 1
          fi
