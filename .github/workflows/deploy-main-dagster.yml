name: Deploy Dagster

on:
  push:
    branches: [main, dev]

env:
  DAGSTER_INSTANCE_CURRENT_ENV: ${{ github.ref == 'refs/heads/main' && 'prd' || 'dev' }}
  DEPLOY_DIR: ${{ github.ref == 'refs/heads/main' && '/opt/main_dagster_prd' || '/opt/main_dagster_dev' }}
  ENV_NAME: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python Environment
        run: |
          # Activate virtual environment
          source ${{ env.DEPLOY_DIR }}/.venv_main_dagster/bin/activate
          
          # Check and install required packages if missing
          python -c "import jinja2" || pip install jinja2
          python -c "import dotenv" || pip install python-dotenv
          
          # Add venv to PATH
          echo "${{ env.DEPLOY_DIR }}/.venv_main_dagster/bin" >> $GITHUB_PATH

      - name: Configure Git Repository
        run: |
          cd ${{ env.DEPLOY_DIR }}
          git config --global --add safe.directory ${{ env.DEPLOY_DIR }}
          export GIT_DIR="${{ env.DEPLOY_DIR }}/.git"
          export GIT_WORK_TREE="${{ env.DEPLOY_DIR }}"

      - name: Update Code from Repository  
        run: |
          cd ${{ env.DEPLOY_DIR }}
          git fetch origin
          git checkout ${GITHUB_REF#refs/heads/}
          git pull --rebase origin ${GITHUB_REF#refs/heads/}

      - name: Process DBT Files
        run: |
          source ${{ env.DEPLOY_DIR }}/.venv_main_dagster/bin/activate
          python "${{ env.DEPLOY_DIR }}/dbt_dwh_farinter/autoload_dbt_deploy.py"

      - name: Deploy Dagster Services
        run: |
          source ${{ env.DEPLOY_DIR }}/.venv_main_dagster/bin/activate
          sudo DAGSTER_INSTANCE_CURRENT_ENV="${{ env.DAGSTER_INSTANCE_CURRENT_ENV }}" \
               DEPLOY_DIR="${{ env.DEPLOY_DIR }}" \
               ENV_NAME="${{ env.ENV_NAME }}" \
               python "${{ env.DEPLOY_DIR }}/generate_dagster_service.py"

      - name: Verify Deployment Status
        if: always()
        run: |
          if [[ ${{ job.status }} == 'success' ]]; then
            echo "✅ Deployment to ${{ env.ENV_NAME }} successful"
          else
            echo "❌ Deployment to ${{ env.ENV_NAME }} failed"
            exit 1
          fi
