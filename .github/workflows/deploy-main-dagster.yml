name: Deploy Dagster

on:
  push:
    branches: [main, dev]

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set deployment environment
        id: set-env
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [[ "$BRANCH" == "main" ]]; then
            echo "deploy_dir=/opt/main_dagster_prd" >> $GITHUB_OUTPUT
            echo "env_name=production" >> $GITHUB_OUTPUT
          else
            echo "deploy_dir=/opt/main_dagster_dev" >> $GITHUB_OUTPUT
            echo "env_name=development" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to ${{ steps.set-env.outputs.env_name }}
        run: |
          DEPLOY_DIR="${{ steps.set-env.outputs.deploy_dir }}"
          BRANCH="${GITHUB_REF#refs/heads/}"

          # Set Python virtual environment path
          export PATH="$DEPLOY_DIR/.venv_main_dagster/bin:$PATH"

          cd "$DEPLOY_DIR" || exit 1
          
          # Configure Git
          export GIT_DIR="$DEPLOY_DIR/.git"
          export GIT_WORK_TREE="$DEPLOY_DIR"

          # Update repository
          git fetch origin
          git checkout "$BRANCH"
          git pull --rebase origin "$BRANCH"

          # Run DBT parser
          python "$DEPLOY_DIR/dbt_dwh_farinter/autoload_dbt_deploy.py"

      - name: Verify deployment
        if: always()
        run: |
          if [[ ${{ job.status }} == 'success' ]]; then
            echo "✅ Deployment to ${{ steps.set-env.outputs.env_name }} successful"
          else
            echo "❌ Deployment to ${{ steps.set-env.outputs.env_name }} failed"
            exit 1
          fi
