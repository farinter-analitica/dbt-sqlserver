name: Deploy Dagster

on:
  push:
    branches: [main, dev]

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set deployment variables
        id: deploy-vars
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [[ "$BRANCH" == "main" ]]; then
            echo "deploy_dir=/opt/main_dagster_prd" >> $GITHUB_OUTPUT
            echo "env_name=production" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "dev" ]]; then
            echo "deploy_dir=/opt/main_dagster_dev" >> $GITHUB_OUTPUT
            echo "env_name=development" >> $GITHUB_OUTPUT
          else
            echo "Error: Unsupported branch $BRANCH"
            exit 1
          fi

      - name: Update deployment
        id: deploy
        run: |
          DEPLOY_DIR="${{ steps.deploy-vars.outputs.deploy_dir }}"
          BRANCH="${GITHUB_REF#refs/heads/}"

          if [[ ! -d "$DEPLOY_DIR" ]]; then
            echo "Error: Directory $DEPLOY_DIR not found"
            exit 1
          fi

          cd "$DEPLOY_DIR" || exit 1
          echo "Deploying to ${{ steps.deploy-vars.outputs.env_name }}..."
          
          git fetch origin || exit 1
          git checkout "$BRANCH" || exit 1
          git pull --rebase origin "$BRANCH" || exit 1

          echo "Running DBT parser..."
          # Run your Python script in the appropriate virtual environment
          PATH="$deploy_dir/.venv_main_dagster/bin:$PATH"
          "$DEPLOY_DIR/.venv_main_dagster/bin/python" "$DEPLOY_DIR/dbt_dwh_farinter/autoload_dbt_deploy.py"

      - name: Deployment status
        if: always()
        run: |
          if [[ ${{ steps.deploy.outcome }} == 'success' ]]; then
            echo "✅ ${{ steps.deploy-vars.outputs.env_name }} deployment successful"
            exit 0
          else
            echo "❌ ${{ steps.deploy-vars.outputs.env_name }} deployment failed"
            exit 1
          fi
