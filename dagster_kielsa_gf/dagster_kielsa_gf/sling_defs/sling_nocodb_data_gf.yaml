source: NOCODB_DATA_GF
target: DAGSTER_DWH_FARINTER
defaults:
  mode: incremental
  object: nocodb_data_gf.{stream_schema}_{stream_table}
  target_options:
    column_casing: snake
    adjust_column_type: true
  source_options:
    flatten: true
streams:
  kielsa.sucursal_horario_dia:
    primary_key: &id001
    - emp_id
    - suc_id
    - dia_id
    target_options:
      table_keys:
        primary: *id001
    update_key: fecha_actualizado
  kielsa.dia_semana:
    primary_key: &id002
    - id
    target_options:
      table_keys:
        primary: *id002
    update_key: fecha_actualizado
  kielsa.sucursal:
    primary_key: &id003
    - emp_id
    - suc_id
    target_options:
      table_keys:
        primary: *id003
    update_key: fecha_actualizado
  kielsa.sucursal_horario_periodo:
    primary_key: &id004
    - emp_id
    - suc_id
    - fecha_desde
    target_options:
      table_keys:
        primary: *id004
    update_key: fecha_actualizado