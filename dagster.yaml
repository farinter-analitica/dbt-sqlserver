# dagster\_core\instance\config.py
storage:
  postgres:
    postgres_db:
      username: { env: DAGSTER_PG_USERNAME }
      password: { env: DAGSTER_PG_PASSWORD }
      hostname: { env: DAGSTER_PG_HOST }
      db_name: { env: DAGSTER_PG_DB }
      port: { env: DAGSTER_PG_PORT }
auto_materialize:
  use_sensors: true
# Opt in to run monitoring
run_monitoring:
  enabled: true
  # values below are the defaults, and don't need to be specified except to override them
  start_timeout_seconds: 180
  cancel_timeout_seconds: 180
  max_resume_run_attempts: 0 # experimental if above 0
  poll_interval_seconds: 120
  free_slots_after_run_end_seconds: 300 # free any hanging concurrency slots after 5 minutes from the end of a run

run_coordinator:
  module: dagster.core.run_coordinator
  class: QueuedRunCoordinator
  config:
    dequeue_use_threads: true
    dequeue_num_workers: 4

concurrency:
  runs:
    max_concurrent_runs: 6 #  10 default, -1 unlimited, 0 no runs
    tag_concurrency_limits:
      # - key: "database"
      #   value: "dwh" # applies when the `database` tag has a value of `redshift`
      #   limit: 8
      - key: "dagster/backfill" # applies when the `dagster/backfill` tag is present, regardless of value
        limit: 4
      # - key: "use-case"
      #   value:
      #     applyLimitPerUniqueValue: true
      #   limit: 3

  pools:
    granularity: "run"
    default_limit: 1
    op_granularity_run_buffer: 1

# Configures how long Dagster keeps sensor / schedule tick data
retention:
  schedule:
    purge_after_days: 31 # sets retention policy for schedule ticks of all types

  sensor:
    purge_after_days:
      skipped: 7
      failure: 20
      success: 31 

  auto_materialize:
    purge_after_days: 31

run_retries:
  enabled: true # Omit this key if using Dagster+, since run retries are enabled by default
  max_retries: 1
  retry_on_asset_or_op_failure: false # Retry on unexepcted run termination
