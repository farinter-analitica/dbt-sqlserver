dbt_dwh_farinter:
  target: dev
  outputs:
    dev:
      type: sqlserver
      driver: "{{ env_var('DBT_SQL_SERVER_ODBC_DRIVER') }}" # (The ODBC Driver installed on your system)
      server: "{{ env_var('DBT_DEV_DWH_FARINTER_SQL_SERVER') }}"
      port: 1433
      database: BI_FARINTER
      schema: dbo
      user: "{{ env_var('DBT_DEV_DWH_FARINTER_USERNAME') }}"
      password: "{{ env_var('DBT_ENV_SECRET_DEV_DWH_FARINTER_PASSWORD') }}"
      trust_cert: True
    prd:
      type: sqlserver
      driver: 'ODBC Driver 18 for SQL Server' # (The ODBC Driver installed on your system)
      server: "{{ env_var('DBT_PRD_DWH_FARINTER_SQL_SERVER') }}"
      port: 1433
      database: BI_FARINTER
      schema: dbo
      user: "{{ env_var('DBT_PRD_DWH_FARINTER_USERNAME') }}"
      password: "{{ env_var('DBT_ENV_SECRET_PRD_DWH_FARINTER_PASSWORD') }}"
      trust_cert: True