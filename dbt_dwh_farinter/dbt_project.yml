
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'dbt_dwh_farinter'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'dbt_dwh_farinter'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models","groups"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this example config, we tell dbt to build all models in the example/
# directory as views. These settings can be overridden in the individual model
# files using the `{{ config(...) }}` macro.


models:
  dbt_dwh_farinter:
    # Config indicated by + and applies to all files under models/example/
    example:
      +materialized: view
      +group: "dbt_first_group"
    dagster_example:
      +group: "dbt_second_group_test"
    dwh_sap:
      +tags: ["dagster_sap_gf/dbt"]
      mart_datos_maestros:
        +group: "dbt_dwh_sap_mart_datos_maestros"
      mart_finanzas:
        +group: "dbt_dwh_sap_mart_finanzas"
      mart_ventas:
        +group: "dbt_dwh_sap_mart_ventas"
      mart_mm:
        +group: "dbt_dwh_sap_mart_mm"
      sap_etl_datos_maestros:
        +group: "sap_etl_dwh"
        +database: "DL_FARINTER"
      sap_etl_mm:
        +group: "sap_etl_dwh"
        +database: "DL_FARINTER"
      bi_farinter:
        +group: 'dbt_dwh_sap_marts'
        +database: 'BI_FARINTER'
      dl_farinter:
        +group: 'sap_etl_dwh'
        +database: 'DL_FARINTER'
        
    dwh_kielsa:
      +tags: ["dagster_kielsa_gf/dbt"]
#      mart_finanzas:
#        +group: "dbt_dwh_kielsa_mart_finanzas"
      mart_datos_maestros:
        +group: "dbt_dwh_kielsa_mart_datos_maestros"
        +meta:
            dagster:
                group: "dbt_dwh_kielsa_mart_datos_maestros"
      mart_existencias:
        +group: "dbt_dwh_kielsa_mart_existencias"
      mart_kpp:
        +group: 'dbt_dwh_kielsa_mart_kpp'
      mart_ventas:
        +group: 'dbt_dwh_kielsa_mart_ventas'
      ldcom_etl_datos_maestros:
        +group: 'ldcom_etl_dwh'
        +database: 'DL_FARINTER'
      bi_farinter:
        +group: 'dbt_dwh_kielsa_marts'
        +database: 'BI_FARINTER'
      dl_farinter:
        +group: 'ldcom_etl_dwh'
        +database: 'DL_FARINTER'

    dwh_global:
      +tags: ["dagster_global_gf/dbt"]
      bi_farinter:
        +group: 'dbt_dwh_marts'
        +database: 'BI_FARINTER'
      dl_farinter:
        +group: 'etl_dwh'
        +database: 'DL_FARINTER'

snapshots:
  dbt_dwh_farinter:
    example:
      +group: 'dbt_first_group'

sources:
  dbt_dwh_farinter:
    dwh_kielsa:
      +tags: ["dagster_kielsa_gf/dbt"]
      mart_kpp:
        +group: 'dbt_dwh_kielsa_mart_kpp'
      bi_farinter:
        +database: 'BI_FARINTER'
      dl_farinter:
        +group: 'ldcom_etl_dwh'
        +database: 'DL_FARINTER'

    dwh_sap:
      +tags: ["dagster_sap_gf/dbt"]
      mart_finanzas:
        +group: 'sap_etl_dwh'
        +database: 'DL_FARINTER'
      mart_mm:
        +group: 'sap_etl_dwh'
        +database: 'DL_FARINTER'
      mart_ventas:
        +group: 'sap_etl_dwh'
        +database: 'DL_FARINTER'
      sap_etl_datos_maestros:
        +group: 'sap_prd'
      sap_etl_mm:
        +group: 'sap_prd'
      bi_farinter:
        +group: 'dbt_dwh_sap_marts'
        +database: 'BI_FARINTER'
      dl_farinter:
        +group: 'sap_etl_dwh'
        +database: 'DL_FARINTER'

    dwh_global:
      +tags: ["dagster_global_gf/dbt"]
      bi_farinter:
        +group: 'dbt_dwh_marts'
        +database: 'BI_FARINTER'
      dl_farinter:
        +group: 'etl_dwh'
        +database: 'DL_FARINTER'
