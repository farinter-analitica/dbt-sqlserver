sources:

- name: DL_FARINTER_nocodb_data_gf
  description: Base de tablas cargadas (Data Lake)
  database: DL_FARINTER
  schema: nocodb_data_gf
  loaded_at_field: Fecha_Actualizado
  tables:
  - name: kielsa_sucursal_horario_dia
  - name: kielsa_sucursal
  - name: kielsa_tiempo_transaccion_coeficiente
  - name: kielsa_incentivo_rol
    columns:
      - name: id
      - name: rol_id
      - name: emp_id
      - name: nombre
      - name: id_responsable
      - name: fecha_creado
      - name: fecha_actualizado
    constraints:
      - type: primary_key
        columns: [id]
      - type: unique
        columns: [rol_id, emp_id]
      - type: foreign_key
        columns: [id_responsable]
        to: source('DL_FARINTER_nocodb_data_gf', 'kielsa_incentivo_rol')
        to_columns: [id]
        name: incentivo_rol_id_responsable_fkey
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          name: unique_rol_id_emp_id
          combination_of_columns:
            - rol_id
            - emp_id
          config:
            severity: error

  - name: kielsa_incentivo_regla_rol
    columns:
      - name: id
      - name: regla_id
        description: ID de regla
      - name: rol_id
        description: ID de rol
      - name: part_regalia
        description: Participación en regalía
      - name: notas
        description: Notas
      - name: aplicar_por_sucursal
        description: Indicador si aplica por sucursal
      - name: fecha_creado
        description: Fecha de creación
      - name: fecha_actualizado
        description: Fecha de actualización
      - name: part_comision
        description: Push money
      - name: valor_por_receta_seguro
        description: Valor por receta de seguro
    constraints:
      - type: primary_key
        columns: [id]
      - type: unique
        columns: [regla_id, rol_id]
      - type: foreign_key
        columns: [regla_id]
        to: source('DL_FARINTER_nocodb_data_gf', 'kielsa_incentivo_regla')
        to_columns: [id]
        name: incentivo_regla_rol_regla_id_fkey
      - type: foreign_key
        columns: [rol_id]
        to: source('DL_FARINTER_nocodb_data_gf', 'kielsa_incentivo_rol')
        to_columns: [id]
        name: incentivo_regla_rol_rol_id_fkey
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          name: unique_regla_id_rol_id
          combination_of_columns:
            - regla_id
            - rol_id
          config:
            severity: error

  - name: kielsa_incentivo_regla_casa
    columns:
      - name: id
      - name: regla_id
      - name: casa_id
      - name: valor_regalia
      - name: notas
      - name: fecha_creado
      - name: fecha_actualizado
    constraints:
      - type: primary_key
        columns: [id]
      - type: unique
        columns: [regla_id, casa_id]
      - type: foreign_key
        columns: [regla_id]
        to: source('DL_FARINTER_nocodb_data_gf', 'kielsa_incentivo_regla')
        to_columns: [id]
        name: incentivo_regla_casa_regla_id_fkey
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          name: unique_regla_id_casa_id
          combination_of_columns:
            - regla_id
            - casa_id
          config:
            severity: error
  - name: kielsa_incentivo_regla_regalia
    columns:
      - name: id
      - name: regla_id
      - name: valor_predeterminado
      - name: notas
      - name: excluir_marca_propia
      - name: aplica_por_part
      - name: fecha_creado
      - name: fecha_actualizado
    constraints:
      - type: primary_key
        columns: [id]
      - type: unique
        columns: [regla_id]
      - type: foreign_key
        columns: [regla_id]
        to: source('DL_FARINTER_nocodb_data_gf', 'kielsa_incentivo_regla')
        to_columns: [id]
        name: incentivo_regla_regalia_regla_id_fkey
  - name: kielsa_incentivo_regla
    # Si hay llaves foráneas, agrégalas aquí
    columns:
      - name: id
        description: Identificador único
      - name: emp_id
        description: ID de empresa
      - name: fecha_desde
        description: Intervalos cerrados
      - name: fecha_hasta
        description: Intervalos cerrados
      - name: notas
        description: Notas
      - name: fecha_creado
        description: Fecha de creación
      - name: fecha_actualizado
        description: Fecha de actualización
    constraints:
      - type: primary_key
        columns: [id]
  - name: kielsa_incentivo_regla_categoria_sucursal
    columns:
      - name: id
      - name: categoria
        description: Categoría
      - name: valor_min
        description: Intervalos cerrados
      - name: valor_max
        description: Intervalos cerrados
      - name: regla_id
      - name: fecha_creado
      - name: fecha_actualizado
    constraints:
      - type: primary_key
        columns: [id]
      - type: unique
        columns: [categoria, regla_id]
      - type: foreign_key
        columns: [regla_id]
        to: source('DL_FARINTER_nocodb_data_gf', 'kielsa_incentivo_regla')
        to_columns: [id]
        name: categoria_sucursal_regla_id_fkey
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          name: unique_regla_id_categoria
          combination_of_columns:
            - regla_id
            - categoria
          config:
            severity: error
  - name: kielsa_incentivo_regla_categoria_sucursal_rol_escala
    columns:
      - name: id
      - name: regla_categoria_sucursal_id
        description: se muestra en Mathesar como emp-regla-cat
      - name: rol_id
      - name: condicion
      - name: valor_min
      - name: valor_max
      - name: valor_incentivo
      - name: fecha_creado
      - name: fecha_actualizado
        description: Timestamp with time zone
    constraints:
      - type: primary_key
        columns: [id]
      - type: foreign_key
        columns: [regla_categoria_sucursal_id]
        to: source('DL_FARINTER_nocodb_data_gf', 'kielsa_incentivo_regla_categoria_sucursal')
        to_columns: [id]
        name: regla_categoria_sucursal_rol_esca_regla_categoria_sucursal_fkey
      - type: foreign_key
        columns: [rol_id]
        to: source('DL_FARINTER_nocodb_data_gf', 'kielsa_incentivo_rol')
        to_columns: [id]
        name: regla_categoria_sucursal_rol_escala_rol_fkey
  - name: kielsa_incentivo_regla_condicion
    columns:
      - name: id
      - name: regla_id
      - name: condicion
        description: Especificar una clave concisa, de mayor agrupacion a menor, con snake_case
      - name: valor
      - name: fecha_creado
      - name: fecha_actualizado
      - name: notas
    constraints:
      - type: primary_key
        columns: [id]
      - type: unique
        columns: [condicion, regla_id]
      - type: foreign_key
        columns: [regla_id]
        to: source('DL_FARINTER_nocodb_data_gf', 'kielsa_incentivo_regla')
        to_columns: [id]
        name: regla_llave_regla_fkey
  - name: kielsa_incentivo_regla_rol_escala
    columns:
      - name: id
      - name: regla_id
      - name: rol_id
      - name: condicion
      - name: valor_min
      - name: valor_max
      - name: valor_incentivo
      - name: porc_venta_general
      - name: fecha_creado
      - name: fecha_actualizado
    constraints:
      - type: primary_key
        columns: [id]
      - type: foreign_key
        columns: [regla_id]
        to: source('DL_FARINTER_nocodb_data_gf', 'kielsa_incentivo_regla')
        to_columns: [id]
        name: regla_rol_escala_regla_fkey
      - type: foreign_key
        columns: [rol_id]
        to: source('DL_FARINTER_nocodb_data_gf', 'kielsa_incentivo_rol')
        to_columns: [id]
        name: regla_rol_escala_rol_fkey


  config:
    freshness:   # default freshness
      warn_after: {count: 28, period: hour}
      error_after: {count: 72, period: hour}
    meta:
      dagster:
        group: nocodb_data_gf
