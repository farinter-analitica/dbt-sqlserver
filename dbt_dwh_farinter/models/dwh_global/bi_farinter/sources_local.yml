---
sources:
  - name: BI_FARINTER
    description: Base de tablas transformadas (Data Warehouse)
    database: BI_FARINTER
    schema: dbo
    tables:
      - name: BI_Dim_Calendario
        config:
          meta:
            dagster:
              group: dbt_dwh_mart_datos_maestros
          loaded_at_field: Fecha_Procesado
      - name: BI_Dim_Pais
        config:
          meta:
            dagster:
              group: dbt_dwh_mart_datos_maestros
      - name: BI_SAP_Hecho_PresupuestoHist
      - name: BI_Dim_Mes
    config:
      freshness:  # default freshness
        warn_after: {count: 28, period: hour}
        error_after: {count: 72, period: hour}
      loaded_at_field: Fecha_Actualizado
