sources:
- name: DL_FARINTER
  description: Base de tablas transformadas (Data Warehouse)
  database: DL_FARINTER
  schema: dbo
  loaded_at_field: Fecha_Actualizado

  tables:
  - name: DL_Edit_CalendarioNoLaboral
    config:
      meta:
        dagster:
          group: dbt_dwh_mart_datos_maestros
  - name: DL_CalendarioBase
  config:
    freshness:   # default freshness
      warn_after: {count: 28, period: hour}
      error_after: {count: 72, period: hour}
