sources:
  - name: DL_FARINTER
    description: "Base de tablas cargadas (Data Lake)"
    database: DL_FARINTER
    schema: dbo
    freshness: # default freshness
        warn_after: {count: 28, period: hour}
        error_after: {count: 72, period: hour}
    loaded_at_field: Fecha_Actualizado
    tables:
      - name: DL_SAP_T001
        description: >
            "Contiene la informacion clave de las sociedades o empresas individuales"
        group: dbt_dwh_sap_mart_datos_maestros
        columns:
          - name: BUKRS #Sociedad_Id
            description: "Codigo de la Sociedad o Empresa Individual"
          - name: Fecha_Actualizado
            description: "Fecha de actualizacion de la informacion"
        meta:
            dagster:
                group: "dbt_dwh_sap_mart_datos_maestros"
