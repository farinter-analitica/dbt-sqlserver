[tool.pyright]
venvPath = "."
venv = ".venv"
typeCheckingMode = "standard"

[tool.pytest.ini_options]
env_files = [".env", ".env.test"]
filterwarnings = [
    "ignore:.*'soft_unicode' has been renamed to 'soft_str'*:DeprecationWarning",
    "ignore:unclosed file .*:ResourceWarning",
    "ignore::DeprecationWarning:.*Pydantic V1 style `@validator` validators are deprecated..*",
    "ignore:.*Parameter `use_user_code_server` .*",
]
testpaths = [
    "dagster_shared_gf/dagster_shared_gf_tests",
    "dagster_sap_gf/dagster_sap_gf_tests",
    "dagster_kielsa_gf/dagster_kielsa_gf_tests",
]

[tool.main_dagster]
python_version = "3.12" # Explicitly specify the required Python version

[tool.uv]
config-settings = { editable_mode = "compat" } # better-toml-ignore

[tool.uv.sources]
dagster_shared_gf = { workspace = true }
dagster_sap_gf = { workspace = true }
dagster_kielsa_gf = { workspace = true }

[tool.uv.workspace]
members = ["dagster_shared_gf", "dagster_sap_gf", "dagster_kielsa_gf"] 

[dependency-groups]
dev = [
    "dash>=3.0.2",
    "joblib>=1.4.2",
    "matplotlib>=3.10.1",
    "neuralforecast>=3.0.0",
    "plotly>=6.0.1",
    "prophet>=1.1.6",
    "scikit-learn>=1.6.1",
    "shap>=0.47.1",
    "statsforecast>=2.0.1",
    "xgboost>=3.0.0",
    "xlsxwriter>=3.2.2",
]
