[tool.pyright]
typeCheckingMode = "standard"
venv = ".venv"
venvPath = "."

[tool.pytest.ini_options]
env_files = [".env", ".env.test"]
filterwarnings = [
    "ignore:.*'soft_unicode' has been renamed to 'soft_str'*:DeprecationWarning",
    "ignore:unclosed file .*:ResourceWarning",
    "ignore::DeprecationWarning:.*Pydantic V1 style `@validator` validators are deprecated..*",
    "ignore:.*Parameter `use_user_code_server` .*",
]
testpaths = [
    "dagster-shared-gf/dagster_shared_gf_tests",
    "dagster-sap-gf/dagster_sap_gf_tests",
    "dagster-kielsa-gf/dagster_kielsa_gf_tests",
    "dagster-global-gf/dagster_global_gf_tests",
]

[tool.main_dagster]
python_version = "3.12" # Explicitly specify the required Python version

[tool.uv]
config-settings = { editable_mode = "compat" } # better-toml-ignore
default-groups = ["dev", "helpers"]

[tool.uv.sources]
dagster-shared-gf = { workspace = true }
dagster-sap-gf = { workspace = true }
dagster-kielsa-gf = { workspace = true }
dagster-global-gf = { workspace = true }

[tool.uv.workspace]
members = ["dagster-shared-gf", "dagster-sap-gf", "dagster-kielsa-gf", "dagster-global-gf"]

[tool.yamlfix]
line_lenght = 0

[dependency-groups]
dev = [
    "dash>=3.0.2",
    "ipykernel>=6.29.5",
    "joblib>=1.4.2",
    "yamllint",
    "yamlfix",
    "pytest",
    "pytest-mock",
    "pytest-dotenv",
    "pyright",
    "ruff",
    "pre-commit",
    "prettier>=0.0.7",
    "sqlfluff",
    "sqlfluff-templater-dbt"
    #"shandy-sqlfmt", #No compatible debido que solo usa snake_case
]

helpers = ["jinja2"]

analitics = [
    "matplotlib>=3.10.1",
    "plotly>=6.0.1",
    "prophet>=1.1.6",
    "scikit-learn>=1.6.1",
    "shap>=0.47.1",
    "statsforecast>=2.0.1",
    "xgboost>=3.0.0",
    "xlsxwriter>=3.2.2",
]
